  <title>Earn the Fall · My Summer</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

  <style>
    :root {
      --bg: #FFF6EF;
      --card: #FFFFFF;
      --ink: #43342F;
      --muted: #A1887A;
      --pink: #FB6F92;
      --pinkDeep: #C2185B;
      --coral: #FF7E5F;
      --gold: #FBB13C;
      --goldDeep: #F59E0B;
      --teal: #17B6A7;
      --tealDeep: #0E8C80;
      --purple: #A678E2;
      --purpleDeep: #7C4DC4;
      --line: #F3E7DC;
      --sunset: linear-gradient(135deg, #FF6B9D 0%, #FF8E72 55%, #FFC15E 100%);
      --pillBg: #FFF1E6;
      --pillBgOff: #F7EEE6;
      --checkpointBg: #FFF4E1;
      --cardDone: #E9FBF7;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1E1A18;
        --card: #2A2421;
        --ink: #EAE0D8;
        --muted: #9B8A80;
        --pink: #E25B7E;
        --pinkDeep: #FF8FA3;
        --coral: #E56A4D;
        --gold: #DDA031;
        --goldDeep: #FFBE4C;
        --teal: #149C8F;
        --tealDeep: #32D4C4;
        --purple: #9267C9;
        --purpleDeep: #BC95F8;
        --line: #3D342E;
        --sunset: linear-gradient(135deg, #A8365B 0%, #B04B32 55%, #B57F26 100%);
        --pillBg: #3B2A1E;
        --pillBgOff: #2E2521;
        --checkpointBg: #362916;
        --cardDone: #18332D;
      }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    
    body { 
      background: var(--bg); 
      font-family: system-ui, -apple-system, sans-serif; 
      color: var(--ink); 
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      overscroll-behavior-y: none;
    }
    
    input, textarea {
      -webkit-user-select: auto;
      user-select: auto;
    }

    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    button { cursor: pointer; background: none; border: none; font: inherit; }
    * { -webkit-tap-highlight-color: transparent; }
    
    @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── Global theme mapper ────────────────────────────────────
    const C = {
      bg:"var(--bg)", card:"var(--card)", ink:"var(--ink)", muted:"var(--muted)",
      pink:"var(--pink)", pinkDeep:"var(--pinkDeep)", coral:"var(--coral)",
      gold:"var(--gold)", goldDeep:"var(--goldDeep)",
      teal:"var(--teal)", tealDeep:"var(--tealDeep)",
      purple:"var(--purple)", purpleDeep:"var(--purpleDeep)", line:"var(--line)",
    };

    // ── Daily tasks ────────────────────────────────────────────
    const ESSENTIALS = ["Make bed", "Brush teeth", "Brush hair", "Get dressed", "Eat breakfast"];
    const CHOICES = [
      "20 minutes of reading",

      "Make or build something creative",

      "20 minutes of music practice",
    ];
    const CHOICE_GOAL = 5;
    const DAY_NAMES = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    const MONTHS = ["Jan","Feb","Mar","Apr","May","June","July","Aug","Sep","Oct","Nov","Dec"];

    // ── Running plan ───────────────────────────────────────────
    const PHASES = [
      { name: "Phase 1 · Re-Establish the Routine", weeks: ["w1","w2","w3"] },
      { name: "Phase 2 · Add the Engine Work",       weeks: ["w4","w5","w6","w7"] },
      { name: "Phase 3 · Peak Base",                 weeks: ["w8","w9","w10"] },
      { name: "Phase 4 · Transition to the Season",  weeks: ["w11","w12"] },
    ];
    const WEEKS = {
      w1:  { n:1,  dates:"Jun 15–21", target:28, items:[
        "6 running days with the team, all easy (5 is fine if I need a rest day) — if I can't hold a conversation, I'm going too fast",
        "Long run: 6 miles","Strides: 6 × 20 sec after two of my easy runs","Strength Session A + Session B",
        "Set a bedtime that gives me 8–10 hours of sleep","Shoe check: I need two pairs of trainers to rotate"]},
      w2:  { n:2,  dates:"Jun 22–28", target:30, items:[
        "6 running days with the team, all easy (5 minimum)","Long run: 6.5 miles","Strides: 6 × 20 sec, twice this week",
        "Strength A + B","One easy run on rolling hills — let the hills do the work","Start my training log: miles, feel score (1–10), sleep hours"]},
      w3:  { n:3,  dates:"Jun 29–Jul 5", target:32, checkpoint:"Any ache lasting 2+ days? Hold at 32 miles next week instead of moving up.", items:[
        "6 running days with the team","Long run: 7 miles","Strides: 7 × 20 sec, twice this week","Strength A + B","Hilly easy run"]},
      w4:  { n:4,  dates:"Jul 6–12",  target:34, items:[
        "First tempo: 15 min continuous @ ~7:00/mi — warm up 1.5 mi first, cool down after","Long run: 7.5 miles","Strides: 8 × 20 sec, twice","Strength A + B"]},
      w5:  { n:5,  dates:"Jul 13–19", target:36, items:[
        "Tempo: 18 min continuous, same effort as last week","Long run: 8 miles","Strides twice · Strength A + B","Hilly easy run","Fueling check: am I eating within 30–45 min after every run?"]},
      w6:  { n:6,  dates:"Jul 20–26", target:38, checkpoint:"Rising resting HR, worse sleep, or flat mood? Two of three → make Week 7 extra easy.", items:[
        "Tempo: 20 min continuous, or 3 × 8 min with 2 min easy jog between","Long run: 8 miles — last mile slightly faster, not hard, just engaged","Strides twice · Strength A + B"]},
      w7:  { n:7,  dates:"Jul 27–Aug 2", target:32, down:true, items:[
        "All easy running — no tempo this week","Long run: 7 miles","Strides once · Strength A only","This week IS the plan working — adaptation happens during recovery","Talk to my coach: share the summer log, ask what they want from me in August"]},
      w8:  { n:8,  dates:"Aug 3–9",   target:40, items:[
        "Tempo: 2 × 12 min with 2 min jog between, ~6:50/mi","Long run: 9 miles","Strides twice · Strength A + B","If team practice has started, fold these into my coach's schedule — don't stack both"]},
      w9:  { n:9,  dates:"Aug 10–16", target:42, items:[
        "Tempo per coach, or 20–22 min continuous","Long run: 9–10 miles","Strides twice · Strength A + B","Replace any shoe past ~400 miles before the season starts"]},
      w10: { n:10, dates:"Aug 17–23", target:44, checkpoint:"I should feel strong and a little hungry to race. Flat or tired = back off.", items:[
        "Peak base week: mostly easy volume, one quality session","Long run: 10 miles","Strength A + B"]},
      w11: { n:11, dates:"Aug 24–30", target:40, items:[
        "My coach's plan leads now — race-specific work begins","Strength drops to maintenance — lighter, never within 24 hrs of a race","First races are fitness checks, not my goal race — don't judge the season by them"]},
      w12: { n:12, dates:"Aug 31–Sep 6", target:0, items:[
        "Mileage per coach — the base is built","My job now: stay healthy, sleep, fuel, and trust the work I've done"]},
    };

    const STRENGTH = [
      { id:"strengthA", title:"Strength A — Lower Body & Balance",
        note:"Do this after an easy run, never before a workout. Form over load — bodyweight is plenty to start.",
        exercises:[
          { name:"Walking Lunges — 2 × 10 each leg", how:"Stand tall, step forward with one foot and lower your back knee toward the ground — don't let it slam down. Your front knee stays above your ankle, not caving inward. Push through your front heel to stand, then step forward with the other foot. Keep your chest up the whole time." },
          { name:"Single-Leg Romanian Deadlifts — 2 × 8 each leg", how:"Stand on one leg with a slight bend in the knee. Hinge forward at the hips — not your lower back — letting your free leg float behind you as a counterweight. Reach toward the ground with your hands. You'll feel a deep stretch in your standing hamstring. Drive that hip forward to return upright. Go slow. Wobbling is normal at first; use a wall for balance if needed." },
          { name:"Step-Ups — 2 × 10 each leg", how:"Find a sturdy bench or box about knee height. Step one foot up fully, then drive through that heel to lift your whole body up. Don't push off the floor foot — make the top leg do all the work. Step back down with control. Switch legs after your set." },
          { name:"Calf Raises — 2 × 15 each (straight + bent knee)", how:"Stand on a step or flat ground. Rise up onto the balls of your feet as high as you can, then lower slowly (3 counts down). Do 15 with straight legs, then 15 with knees slightly bent — the bent version targets your soleus deeper in the calf. These protect your Achilles as mileage builds." },
          { name:"Side Plank — 2 × 30 sec each side", how:"Lie on your side and prop yourself up on one forearm, elbow below your shoulder. Stack your feet or stagger them for balance. Lift your hips so your body forms a straight line from head to heel — no sagging hips or lifted butt. Breathe steadily. If 30 sec is too hard at first, drop to 15 and build up." },
        ]},
      { id:"strengthB", title:"Strength B — Hips, Glutes & Core",
        note:"Weak hips are the #1 cause of running injuries. These are injury insurance as much as performance.",
        exercises:[
          { name:"Glute Bridges — 2 × 12 (progress to single-leg)", how:"Lie on your back with knees bent, feet flat on the floor hip-width apart. Drive through your heels and squeeze your glutes to lift your hips until your body forms a straight line from knees to shoulders. Hold 1–2 seconds at the top. Lower slowly. Once this feels easy, extend one leg straight and do the bridge on one foot — much harder." },
          { name:"Clamshells or Banded Side Steps — 2 × 15 each side", how:"Clamshells: lie on your side with knees bent at 45°, feet together. Keep your feet touching and rotate your top knee up toward the ceiling like a clamshell opening. Don't rock your pelvis back — the movement is only at the hip. Banded side steps: put a resistance band just above your knees, stand with a slight bend, and step sideways 10 steps each direction, keeping tension in the band." },
          { name:"Dead Bugs — 2 × 10 each side", how:"Lie on your back, arms pointing straight at the ceiling, knees bent at 90° lifted off the floor. Slowly lower your right arm behind your head and your left leg toward the floor at the same time — without letting your lower back arch off the ground. Return and switch sides. Go slowly. The goal is control, not speed." },
          { name:"Front Plank — 2 × 45 sec", how:"Forearms on the ground, elbows below shoulders, toes on the ground. Lift your hips so your body is a straight board — squeeze your glutes and brace your core like you're about to take a punch. Don't let your hips sag or pike up. Breathe. If your form breaks before time is up, rest and restart — a shorter perfect plank beats a long sloppy one." },
          { name:"Monster Walks with Band — 2 × 10 steps each direction", how:"Put a resistance band just above your ankles or knees. Get into a slight squat — hips back, chest up, knees tracking over your toes. Step sideways, keeping the squat and band tension the whole time. Take 10 steps right, then 10 left without standing up. You'll feel this in your outer glutes immediately." },
        ]},
    ];

    const REFNOTES = [
      { id:"daily", title:"Fueling & Recovery Notes", flag:false, note:"This stuff matters more than any single workout.", items:[
        "8–10 hours of sleep — this is when I actually get fitter","Never skip breakfast, especially on run days",
        "Eat within ~45 min after every run (carbs + protein)","Keep a water bottle with me — pale yellow is the goal"]},
      { id:"flags", title:"🚩 Red Flags — any one means back off", flag:true, note:"Don't push through these. Reassess, and don't wait-and-see on the last one.", items:[
        "Pain that changes my stride or lasts more than 3 days","Persistent fatigue, irritability, or dreading runs I normally enjoy",
        "Eating less while training more, or new anxiety around food","Any disruption to my cycle — this is a call-the-doctor item, not a wait-and-see"]},
    ];

    const STORAGE_KEY = "xc_summer_2026";
    const CLIENT_ID = Math.random().toString(36).slice(2, 9);

    // ── Cloud sync (Supabase Client) ───────────────────────────
    const SUPABASE_URL = "https://kbnqkuyflqoqrqqgxutw.supabase.co";
    const SUPABASE_KEY = "sb_publishable_0fR8lEfLyBYsnE6kaC3mHA_vaw0PyTh";
    const RECORD_ID = "daughter-summer-2026";
    
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ── Date helpers ───────────────────────────────────────────
    function dateKey(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
    function weekdayDatesOf(d){
      const day=d.getDay(); const mon=new Date(d);
      mon.setDate(d.getDate() + (day===0?-6:1-day));
      return [0,1,2,3,4].map(i=>{ const x=new Date(mon); x.setDate(mon.getDate()+i); return x; });
    }
    function dayComplete(rec){
      if(!rec) return false;
      const e = ESSENTIALS.every((_,i)=> rec.e && rec.e[i]);
      const c = CHOICES.filter((_,i)=> rec.c && rec.c[i]).length;
      return e && c >= CHOICE_GOAL;
    }

    // ── Summer school ──────────────────────────────────────────
    const COURSES = [
      { id:"drivers", name:"Drivers Ed", emoji:"🚗" },
      { id:"french",  name:"French", emoji:"🥐" },
      { id:"health",  name:"Health", emoji:"🩺" },
      { id:"digital", name:"Digital Literacy", emoji:"💻" },
    ];
    function lastStudiedLabel(arr, tKey){
      if(!arr || !arr.length) return "Not started yet";
      if(arr.includes(tKey)) return "Studied today ✓";
      const sorted=[...arr].sort(); const last=sorted[sorted.length-1];
      const days=Math.round((new Date(tKey+"T00:00:00") - new Date(last+"T00:00:00"))/86400000);
      return days===1 ? "Last studied: yesterday" : `Last studied: ${days} days ago`;
    }

    // ── Styles ─────────────────────────────────────────────────
    const S = {
      wrap:{ minHeight:"100vh", background:C.bg, paddingBottom:64 },
      header:{ background:"var(--sunset)", color:"#fff", padding:"calc(30px + env(safe-area-inset-top)) 20px 26px", borderRadius:"0 0 26px 26px" },
      inner:{ maxWidth:600, margin:"0 auto" },
      eyebrow:{ fontSize:11, letterSpacing:"0.22em", textTransform:"uppercase", color:"rgba(255,255,255,0.85)", fontWeight:700 },
      h1:{ fontSize:28, fontWeight:800, marginTop:4, lineHeight:1.1, textShadow:"0 1px 8px rgba(0,0,0,0.12)" },
      sub:{ fontSize:13, color:"rgba(255,255,255,0.9)", marginTop:4 },
      body:{ maxWidth:600, margin:"0 auto", padding:"4px 16px 0" },
      phaseLabel:{ fontSize:11, letterSpacing:"0.18em", textTransform:"uppercase", fontWeight:800, color:C.pinkDeep, margin:"26px 0 10px" },
      // today
      todayCard:{ background:C.card, borderRadius:20, boxShadow:"0 8px 26px rgba(0,0,0,0.06)", marginTop:-14, padding:"18px 18px 20px", border:"1px solid var(--line)", position:"relative", zIndex:2 },
      todayTop:{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:4 },
      todayDate:{ fontSize:18, fontWeight:800, color:C.ink },
      todaySub:{ fontSize:12, color:C.muted, marginTop:1 },
      pillRow:{ display:"flex", gap:6, marginTop:14, marginBottom:4 },
      pill:(done,today)=>({ flex:1, textAlign:"center", padding:"7px 0", borderRadius:10, fontSize:12, fontWeight:700,
        background: done? C.teal : (today? "var(--pillBg)":"var(--pillBgOff)"), color: done? "#fff" : (today? C.goldDeep:C.muted),
        border: today? `2px solid ${C.gold}`:"2px solid transparent" }),
      sectLabel:{ fontSize:12, fontWeight:800, color:C.ink, margin:"16px 0 8px", display:"flex", alignItems:"center", gap:7 },
      chip:(c)=>({ fontSize:11, fontWeight:700, color:"#fff", background:c, borderRadius:20, padding:"2px 9px" }),
      taskRow:{ display:"flex", alignItems:"center", gap:11, padding:"8px 0", width:"100%", textAlign:"left", borderBottom:`1px solid ${C.line}` },
      tbox:(c,color)=>({ width:24, height:24, borderRadius:8, border:`2px solid ${c?color:"var(--muted)"}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, flexShrink:0, background:c?color:"transparent", color:"#fff", transition:"all .15s" }),
      ttxt:(c)=>({ fontSize:15, color:c?C.muted:C.ink, textDecoration:c?"line-through":"none" }),
      weekendBox:{ textAlign:"center", padding:"22px 10px" },
      // week cards
      card:(done)=>({ borderRadius:16, border:`1.5px solid ${done?C.teal:"var(--line)"}`, background:done?"var(--cardDone)":C.card, marginBottom:8, overflow:"hidden" }),
      cardBtn:{ width:"100%", display:"flex", alignItems:"center", justifyContent:"space-between", padding:"13px 16px", textAlign:"left" },
      circle:(done)=>({ width:34, height:34, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, fontWeight:800, flexShrink:0, background:done?C.teal:"var(--pillBg)", color:done?"#fff":C.goldDeep }),
      weekTitle:{ fontWeight:800, fontSize:14, color:C.ink },
      weekSub:{ fontSize:12, color:C.muted },
      downBadge:{ fontSize:10, fontWeight:800, letterSpacing:"0.05em", textTransform:"uppercase", background:"var(--line)", color:C.purple, padding:"2px 7px", borderRadius:5, marginLeft:6 },
      count:{ fontSize:12, color:C.muted },
      body2:{ padding:"0 16px 16px", borderTop:`1px solid ${C.line}` },
      checkRow:{ display:"flex", alignItems:"flex-start", gap:10, padding:"7px 0", width:"100%", textAlign:"left" },
      box:(c)=>({ width:21, height:21, borderRadius:6, border:`2px solid ${c?C.coral:"var(--muted)"}`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, flexShrink:0, marginTop:1, background:c?C.coral:"transparent", color:"#fff", transition:"all .15s" }),
      checkTxt:(c)=>({ fontSize:14, color:c?C.muted:C.ink, textDecoration:c?"line-through":"none", lineHeight:1.4 }),
      checkpoint:{ marginTop:10, fontSize:12, background:"var(--checkpointBg)", border:`1px solid ${C.gold}`, color:C.goldDeep, borderRadius:10, padding:"9px 12px" },
      milesRow:{ marginTop:12, display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" },
      milesLabel:{ fontSize:12, fontWeight:700, color:C.muted },
      milesInput:{ width:64, padding:"6px 8px", fontSize:14, border:`1.5px solid ${C.line}`, background:"var(--bg)", borderRadius:9, textAlign:"center", outline:"none", fontFamily:"inherit", color:C.ink },
      milesFb:(ok)=>({ fontSize:12, fontWeight:700, color:ok?C.tealDeep:C.muted }),
      ref:(flag)=>({ borderRadius:16, border:`1.5px solid ${flag?"#FBC9C0":"var(--line)"}`, background:C.card, marginBottom:8, overflow:"hidden" }),
      refBtn:{ width:"100%", display:"flex", justifyContent:"space-between", alignItems:"center", padding:"13px 16px", textAlign:"left" },
      refTitle:(flag)=>({ fontWeight:800, fontSize:14, color:flag?"#B23A2E":C.ink }),
      refBody:{ padding:"0 16px 14px", borderTop:`1px solid ${C.line}` },
      refNote:{ fontSize:12, fontStyle:"italic", color:C.muted, padding:"8px 0 6px" },
      refItem:{ fontSize:13, color:C.ink, display:"flex", gap:8, padding:"3px 0", alignItems:"flex-start" },
      exCard:{ background:"var(--bg)", borderRadius:11, border:`1px solid ${C.line}`, marginBottom:9, overflow:"hidden" },
      exBtn:{ width:"100%", display:"flex", justifyContent:"space-between", alignItems:"center", padding:"10px 13px", textAlign:"left", gap:8 },
      exName:{ fontWeight:700, fontSize:13, color:C.ink, lineHeight:1.3 },
      exHow:{ fontSize:13, color:C.muted, lineHeight:1.6, padding:"0 13px 12px" },
      mantra:{ textAlign:"center", padding:"26px 16px 8px", fontSize:13, color:C.muted, fontStyle:"italic", lineHeight:1.7 },
      statusBar:{ maxWidth:600, margin:"0 auto", padding:"8px 16px 0", textAlign:"right", fontSize:11, color:C.muted, height:26 },
      toastWrap: { position: "fixed", bottom: 24, left: 0, right: 0, display: "flex", justifyContent: "center", pointerEvents: "none", zIndex: 100 },
      toast: { background: "var(--ink)", color: "var(--bg)", padding: "10px 20px", borderRadius: 999, fontSize: 14, fontWeight: 700, boxShadow: "0 4px 12px rgba(0,0,0,0.15)", animation: "fadeInUp 0.3s ease" }
    };

    function Sun({ on }){
      return (
        <svg width="46" height="46" viewBox="0 0 46 46" style={{ animation: on?"pop .5s ease":"none" }}>
          <g stroke={on?C.gold:"var(--line)"} strokeWidth="2.5" strokeLinecap="round" style={{transition:"stroke .4s"}}>
            {[...Array(8)].map((_,i)=>{ const a=i*45*Math.PI/180;
              return <line key={i} x1={23+Math.cos(a)*16} y1={23+Math.sin(a)*16} x2={23+Math.cos(a)*21} y2={23+Math.sin(a)*21} opacity={on?1:0.55}/>; })}
          </g>
          <circle cx="23" cy="23" r="11" fill={on?C.gold:"none"} stroke={on?C.goldDeep:"var(--line)"} strokeWidth="2.5" style={{transition:"all .4s"}}/>
        </svg>
      );
    }

    function MileageChart({ miles }){
      const keys=Object.keys(WEEKS); const maxT=44;
      return (
        <div style={{ marginTop:18 }}>
          <div style={{ display:"flex", alignItems:"flex-end", gap:3, height:64 }}>
            {keys.map(wk=>{ const w=WEEKS[wk]; const t=w.target||38; const lg=Number(miles[wk])||0;
              return (
                <div key={wk} style={{ flex:1, height:"100%", display:"flex", alignItems:"flex-end", position:"relative" }}>
                  <div style={{ position:"absolute", bottom:0, width:"100%", height:`${(t/maxT)*100}%`, background:"rgba(255,255,255,0.22)", borderRadius:"3px 3px 0 0" }}/>
                  <div style={{ position:"absolute", bottom:0, width:"100%", height:`${Math.min((lg/maxT)*100,100)}%`, background:"#fff", borderRadius:"3px 3px 0 0", transition:"height .4s" }}/>
                </div>
              ); })}
          </div>
          <div style={{ display:"flex", gap:3, marginTop:3 }}>
            {keys.map(wk=> <div key={wk} style={{ flex:1, textAlign:"center", fontSize:9, color:"rgba(255,255,255,0.6)" }}>{WEEKS[wk].n}</div>)}
          </div>
        </div>
      );
    }

    function ExerciseCard({ ex }){
      const [open,setOpen]=useState(false);
      return (
        <div style={S.exCard}>
          <button style={S.exBtn} onClick={()=>setOpen(o=>!o)}>
            <span style={S.exName}>{ex.name}</span>
            <span style={{ color:C.muted, flexShrink:0, transform:open?"rotate(180deg)":"none", display:"inline-block", transition:"transform .2s" }}>▾</span>
          </button>
          {open && <div style={S.exHow}>{ex.how}</div>}
        </div>
      );
    }

    function TodayCard({ state, setState }){
      const [offset, setOffset] = useState(0); 
      const now = new Date();
      const view = new Date(now); view.setDate(now.getDate() + offset);
      const dow = view.getDay();
      const weekend = dow===0 || dow===6;
      const tKey = dateKey(view);
      const isToday = offset === 0;
      const rec = (state.daily && state.daily[tKey]) || { e:{}, c:{} };
      const eDone = ESSENTIALS.filter((_,i)=>rec.e && rec.e[i]).length;
      const cDone = CHOICES.filter((_,i)=>rec.c && rec.c[i]).length;
      const complete = eDone===ESSENTIALS.length && cDone>=CHOICE_GOAL;
      const totalDays = Object.values(state.daily||{}).filter(dayComplete).length;
      const weekDates = weekdayDatesOf(view);
      
      const prevCompleteRef = useRef(complete);

      useEffect(() => {
        if (complete && !prevCompleteRef.current && isToday) {
          window.confetti && window.confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        }
        prevCompleteRef.current = complete;
      }, [complete, isToday]);

      const toggle = (group,i)=>{
        if(offset > 0) return; 
        setState(s=>{
          const daily = { ...(s.daily||{}) };
          const cur = daily[tKey] || { e:{}, c:{} };
          const next = { e:{...cur.e}, c:{...cur.c} };
          next[group][i] = !next[group][i];
          daily[tKey] = next;
          return { ...s, daily };
        });
      };

      const jumpTo = (targetDate)=>{
        const a = new Date(); a.setHours(0,0,0,0);
        const b = new Date(targetDate); b.setHours(0,0,0,0);
        const diff = Math.round((b - a)/86400000);
        if(diff <= 0) setOffset(diff); 
      };
      const editable = offset <= 0;

      const dateLine = `${DAY_NAMES[dow]}, ${MONTHS[view.getMonth()]} ${view.getDate()}`;

      const navBtn=(disabled)=>({ width:34, height:34, borderRadius:10, border:`1.5px solid var(--line)`,
        background: disabled?"transparent":"var(--bg)", color: disabled?"var(--line)":C.coral, fontSize:18, fontWeight:800, lineHeight:1,
        display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0, opacity:disabled?0.6:1 });

      return (
        <div style={S.todayCard}>
          <div style={S.todayTop}>
            <div style={{ display:"flex", alignItems:"center", gap:8, flex:1, minWidth:0 }}>
              <button style={navBtn(false)} onClick={()=>setOffset(o=>o-1)}>‹</button>
              <div style={{ minWidth:0 }}>
                <div style={S.todayDate}>{isToday ? "Today" : dateLine}</div>
                <div style={S.todaySub}>
                  {isToday ? `🌞 ${totalDays} summer ${totalDays===1?"day":"days"} crushed` : dateLine}
                </div>
              </div>
            </div>
            <button style={navBtn(isToday)} onClick={()=>{ if(!isToday) setOffset(o=>Math.min(0,o+1)); }} disabled={isToday}>›</button>
            <Sun on={complete}/>
          </div>

          {!isToday && (
            <button onClick={()=>setOffset(0)} style={{ width:"100%", marginTop:10, padding:"7px", borderRadius:10, border:`1.5px solid ${C.coral}`, background:"transparent", color:C.coral, fontSize:12.5, fontWeight:800 }}>
              ⟲ Jump back to today
            </button>
          )}

          <div style={S.pillRow}>
            {["M","T","W","T","F"].map((lab,i)=>{
              const d = weekDates[i];
              const k = dateKey(d);
              const done = dayComplete(state.daily?.[k]);
              const viewed = k===tKey;
              const todayMidnight = new Date(); todayMidnight.setHours(0,0,0,0);
              const future = (()=>{ const x=new Date(d); x.setHours(0,0,0,0); return x>todayMidnight; })();
              return (
                <button key={i} onClick={()=>jumpTo(d)} disabled={future}
                  style={{ ...S.pill(done,viewed), cursor: future?"default":"pointer", opacity: future?0.4:1 }}>
                  {done?"✓":lab}
                </button>
              );
            })}
          </div>

          {weekend ? (
            <div style={S.weekendBox}>
              <div style={{ fontSize:34 }}>🏖️</div>
              <div style={{ fontWeight:800, fontSize:16, marginTop:6, color:C.ink }}>{isToday ? "It's the weekend!" : "Weekend"}</div>
              <div style={{ fontSize:13, color:C.muted, marginTop:4, maxWidth:300, marginLeft:"auto", marginRight:"auto" }}>
                No checklist on weekends. Rest up, have fun, get your run in with the team, and recharge.
              </div>
            </div>
          ) : (
            <div style={{ opacity: 1 }}>
              {!isToday && editable && (
                <div style={{ marginTop:12, marginBottom:2, fontSize:11.5, color:C.coral, fontWeight:700, textAlign:"center" }}>
                  ✏️ Editing a past day — you can still check things off
                </div>
              )}
              <div style={S.sectLabel}>
                Morning Essentials
                <span style={S.chip(eDone===ESSENTIALS.length?C.teal:C.pink)}>{eDone}/{ESSENTIALS.length}</span>
              </div>
              {ESSENTIALS.map((t,i)=>{ const c=!!(rec.e && rec.e[i]);
                return (
                  <button key={i} style={{ ...S.taskRow, cursor: editable?"pointer":"default" }} onClick={()=>toggle("e",i)}>
                    <div style={S.tbox(c,C.pink)}>{c?"✓":""}</div>
                    <span style={S.ttxt(c)}>{t}</span>
                  </button>
                ); })}

              <div style={S.sectLabel}>
                Pick at least 5
                <span style={S.chip(cDone>=CHOICE_GOAL?C.teal:C.gold)}>{cDone}/{CHOICE_GOAL}</span>
              </div>
              {CHOICES.map((t,i)=>{ const c=!!(rec.c && rec.c[i]);
                return (
                  <button key={i} style={{ ...S.taskRow, cursor: editable?"pointer":"default" }} onClick={()=>toggle("c",i)}>
                    <div style={S.tbox(c,C.teal)}>{c?"✓":""}</div>
                    <span style={S.ttxt(c)}>{t}</span>
                  </button>
                ); })}

              {complete && (
                <div style={{ marginTop:14, textAlign:"center", background:"var(--pillBg)", borderRadius:12, padding:"12px", fontWeight:800, color:C.pinkDeep }}>
                  {isToday ? "🎉 Day complete — you crushed it!" : "🎉 Crushed this day!"}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    function SchoolSection({ state, setState }){
      const now=new Date(); const tKey=dateKey(now);
      const school = state.school || { progress:{}, sessions:{} };
      const prog = school.progress||{}; const sess = school.sessions||{};
      const stepBtn={ width:36, height:30, borderRadius:8, border:`1.5px solid var(--line)`, background:"var(--bg)", color:C.purpleDeep, fontSize:18, fontWeight:800, lineHeight:1 };

      const bump=(id,delta)=>setState(s=>{
        const sc={ progress:{...(s.school?.progress||{})}, sessions:{...(s.school?.sessions||{})} };
        sc.progress[id]=Math.max(0,Math.min(100,(sc.progress[id]||0)+delta));
        return {...s, school:sc};
      });
      const toggleToday=(id)=>setState(s=>{
        const sc={ progress:{...(s.school?.progress||{})}, sessions:{...(s.school?.sessions||{})} };
        const arr=sc.sessions[id]?[...sc.sessions[id]]:[];
        sc.sessions[id]= arr.includes(tKey)? arr.filter(d=>d!==tKey):[...arr,tKey];
        return {...s, school:sc};
      });

      const avg=Math.round(COURSES.reduce((a,c)=>a+(prog[c.id]||0),0)/COURSES.length);
      const allDone=COURSES.every(c=>(prog[c.id]||0)>=100);

      return (
        <>
          <div style={{ ...S.phaseLabel, color:C.purpleDeep, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
            <span>Summer School</span>
            <span style={{ fontSize:12, fontWeight:800, color:C.purple, textTransform:"none", letterSpacing:0 }}>{avg}% overall</span>
          </div>
          {COURSES.map(c=>{
            const p=prog[c.id]||0; const arr=sess[c.id]||[]; const today=arr.includes(tKey); const done=p>=100;
            return (
              <div key={c.id} style={{ background:C.card, borderRadius:14, border:`1.5px solid ${done?C.teal:"var(--line)"}`, padding:"13px 15px", marginBottom:8 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", gap:8 }}>
                  <span style={{ fontWeight:800, fontSize:15, color:C.ink }}>{c.emoji} {c.name}</span>
                  <button onClick={()=>toggleToday(c.id)} style={{ fontSize:12, fontWeight:800, padding:"6px 12px", borderRadius:20, flexShrink:0,
                    background: today? C.purple:"transparent", color: today? "#fff":C.purpleDeep, border:`1.5px solid ${today?C.purple:"var(--line)"}` }}>
                    {today? "Studied today ✓":"Study today"}
                  </button>
                </div>
                <div style={{ display:"flex", alignItems:"center", gap:10, marginTop:11 }}>
                  <div style={{ flex:1, height:9, background:"var(--bg)", borderRadius:99, overflow:"hidden" }}>
                    <div style={{ height:"100%", width:`${p}%`, background: done? C.teal : `linear-gradient(90deg,${C.purple},${C.pink})`, borderRadius:99, transition:"width .35s" }}/>
                  </div>
                  <span style={{ fontSize:13, fontWeight:800, color: done?C.tealDeep:C.purpleDeep, minWidth:38, textAlign:"right" }}>{p}%</span>
                </div>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginTop:10 }}>
                  <div style={{ display:"flex", gap:6 }}>
                    <button onClick={()=>bump(c.id,-10)} style={stepBtn}>−</button>
                    <button onClick={()=>bump(c.id,10)} style={stepBtn}>+</button>
                  </div>
                  <span style={{ fontSize:11.5, color:C.muted }}>{arr.length} {arr.length===1?"session":"sessions"} · {lastStudiedLabel(arr,tKey)}</span>
                </div>
              </div>
            );
          })}
          {allDone && (
            <div style={{ textAlign:"center", background:"var(--pillBg)", borderRadius:12, padding:"12px", fontWeight:800, color:C.purpleDeep, marginBottom:4 }}>
              🎓 All summer school done — incredible!
            </div>
          )}
        </>
      );
    }

    function App(){
      const [state,setState] = useState({ checked:{}, miles:{}, daily:{}, school:{progress:{},sessions:{}}, runs:{} });
      const [open,setOpen] = useState({ w1:true });
      const [refOpen,setRefOpen] = useState({});
      const [strOpen,setStrOpen] = useState({});
      const [status,setStatus] = useState("idle");
      const [toast,setToast] = useState(null);
      
      const saveTimer = useRef(null);
      const loaded = useRef(false);

      const mergeStates = (p)=>({ checked:p.checked||{}, miles:p.miles||{}, daily:p.daily||{}, school:p.school||{progress:{},sessions:{}}, runs:p.runs||{} });

      // ── Load & Live Sync (Supabase WebSockets) ──
      useEffect(()=>{
        (async ()=>{
          try{ 
            const raw=localStorage.getItem(STORAGE_KEY); 
            if(raw) {
                setState(mergeStates(JSON.parse(raw))); 
            }
          }catch(e){}
          
          try{
            const { data, error } = await supabase.from("progress").select("data").eq("id", RECORD_ID).maybeSingle();
            if(error) throw error;
            if(data && data.data) {
                const serverData = mergeStates(data.data);
                setState(serverData);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(serverData));
            }
            setStatus("synced");
          }catch(e){ setStatus("offline"); }
          loaded.current = true;
        })();

        const channel = supabase.channel("progress-sync").on("postgres_changes", { event: "*", schema: "public", table: "progress", filter: `id=eq.${RECORD_ID}` },
          (payload) => {
            if (!payload.new || payload.new.last_client === CLIENT_ID) return;
            const incoming = mergeStates(payload.new.data);
            setState(incoming);
            showToast("Plan updated remotely ✨");
          }
        ).subscribe();

        return () => supabase.removeChannel(channel);
      },[]);

      // ── Save (Debounced) ──
      useEffect(()=>{ 
        if(!loaded.current) return;
        try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){}
        setStatus("saving"); clearTimeout(saveTimer.current);
        
        saveTimer.current=setTimeout(async ()=>{
          try{ 
              await supabase.from("progress").upsert({ id: RECORD_ID, data: state, last_client: CLIENT_ID, updated_at: new Date().toISOString() });
              setStatus("synced"); 
          }
          catch(e){ setStatus("offline"); }
          saveTimer.current = null;
        }, 500);
        return ()=>clearTimeout(saveTimer.current);
      },[state]);

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 3500); };
      const toggle=(wk,i)=>{ const key=`${wk}-${i}`; setState(s=>({ ...s, checked:{...s.checked,[key]:!s.checked[key]} })); };
      const setMiles=(wk,val)=>{ const num= val===""?"":Math.max(0,Math.min(99,Number(val)||0)); setState(s=>({ ...s, miles:{...s.miles,[wk]:num} })); };
      const toggleRun=(wk,d)=> setState(s=>{ const runs={...(s.runs||{})}; const cur={...(runs[wk]||{})}; cur[d]=!cur[d]; runs[wk]=cur; return {...s, runs}; });
      const weekDone=wk=> WEEKS[wk].items.every((_,i)=>state.checked[`${wk}-${i}`]);
      const totalItems=Object.keys(WEEKS).reduce((a,k)=>a+WEEKS[k].items.length,0);
      const doneItems=Object.values(state.checked).filter(Boolean).length;
      const pct=Math.round((doneItems/totalItems)*100);
      const totalMiles=Object.values(state.miles).reduce((a,m)=>a+(Number(m)||0),0);

      return (
        <div style={S.wrap}>
          <div style={S.header}>
            <div style={S.inner}>
              <div style={S.eyebrow}>My Summer · 2026</div>
              <h1 style={S.h1}>Earn the Fall ☀️</h1>
              <p style={S.sub}>Jun 15 – Sep 6 · 12 weeks · 28 → 44 mpw</p>
              <MileageChart miles={state.miles}/>
              <div style={{ marginTop:12, display:"flex", justifyContent:"space-between", fontSize:12 }}>
                <span style={{ color:"rgba(255,255,255,0.92)" }}><span style={{ display:"inline-block", width:10, height:10, background:"#fff", borderRadius:2, marginRight:6, verticalAlign:"middle" }}/>{totalMiles} miles logged</span>
                <span style={{ color:"rgba(255,255,255,0.92)" }}>{doneItems}/{totalItems} items · {pct}%</span>
              </div>
            </div>
          </div>

          <div style={S.body}>
            <TodayCard state={state} setState={setState}/>
          </div>

          <div style={S.statusBar}>
            {status==="saving" && "Saving…"}
            {status==="synced" && "✓ Synced across devices"}
            {status==="offline" && <span style={{ color:"var(--coral)" }}>Offline — saved on this device, will sync later</span>}
          </div>

          <div style={S.body}>
            <SchoolSection state={state} setState={setState}/>
            <div style={S.phaseLabel}>My Running Plan</div>
            {PHASES.map(phase=>(
              <div key={phase.name}>
                <div style={{ ...S.phaseLabel, color:C.coral, margin:"18px 0 8px" }}>{phase.name}</div>
                {phase.weeks.map(wk=>{ const w=WEEKS[wk]; const isOpen=!!open[wk]; const done=weekDone(wk);
                  const checked=w.items.filter((_,i)=>state.checked[`${wk}-${i}`]).length;
                  return (
                    <div key={wk} style={S.card(done)}>
                      <button style={S.cardBtn} onClick={()=>setOpen(o=>({...o,[wk]:!o[wk]}))}>
                        <div style={{ display:"flex", alignItems:"center", gap:12, minWidth:0 }}>
                          <div style={S.circle(done)}>{done?"✓":w.n}</div>
                          <div>
                            <div style={S.weekTitle}>Week {w.n}{w.down && <span style={S.downBadge}>Down week</span>}</div>
                            <div style={S.weekSub}>{w.dates} · {w.target?`${w.target} mi target`:"per coach"}</div>
                          </div>
                        </div>
                        <div style={{ display:"flex", alignItems:"center", gap:8, flexShrink:0 }}>
                          <span style={S.count}>{checked}/{w.items.length}</span>
                          <span style={{ color:C.muted, transform:isOpen?"rotate(180deg)":"none", display:"inline-block", transition:"transform .2s" }}>▾</span>
                        </div>
                      </button>
                      {isOpen && (
                        <div style={S.body2}>
                          {w.items.map((item,i)=>{ const c=!!state.checked[`${wk}-${i}`];
                            return (
                              <button key={i} style={S.checkRow} onClick={()=>toggle(wk,i)}>
                                <div style={S.box(c)}>{c?"✓":""}</div>
                                <span style={S.checkTxt(c)}>{item}</span>
                              </button>
                            ); })}
                          {w.checkpoint && <div style={S.checkpoint}><strong>Checkpoint: </strong>{w.checkpoint}</div>}
                          <div style={{ marginTop:13 }}>
                            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:7 }}>
                              <span style={S.milesLabel}>Days I ran <span style={{ fontWeight:600, color:C.muted }}>(Sun = rest)</span></span>
                              <span style={{ fontSize:12, fontWeight:800, color:C.coral }}>
                                {Object.values(state.runs?.[wk]||{}).filter(Boolean).length}/6
                              </span>
                            </div>
                            <div style={{ display:"flex", gap:6 }}>
                              {["M","T","W","T","F","S"].map((lab,d)=>{ const ran=!!(state.runs?.[wk]&&state.runs[wk][d]);
                                return (
                                  <button key={d} onClick={()=>toggleRun(wk,d)}
                                    style={{ flex:1, padding:"9px 0", borderRadius:9, fontSize:13, fontWeight:800,
                                      border:`1.5px solid ${ran?C.coral:"var(--line)"}`,
                                      background: ran?C.coral:"transparent", color: ran?"#fff":C.muted, transition:"all .15s" }}>
                                    {ran?"✓":lab}
                                  </button>
                                ); })}
                            </div>
                          </div>
                          <div style={S.milesRow}>
                            <span style={S.milesLabel}>Miles I ran this week:</span>
                            <input type="number" inputMode="decimal" min="0" max="99" style={S.milesInput}
                              value={state.miles[wk] ?? ""} placeholder={w.target?`${w.target}`:"—"} onChange={e=>setMiles(wk,e.target.value)}/>
                            {Number(state.miles[wk])>0 && w.target>0 && (
                              <span style={S.milesFb(Number(state.miles[wk])>=w.target)}>
                                {Number(state.miles[wk])>=w.target ? "Target hit ✓" : `${(w.target-Number(state.miles[wk])).toFixed(1)} short — log it honestly`}
                              </span>
                            )}
                          </div>
                        </div>
                      )}
                    </div>
                  ); })}
              </div>
            ))}

            <div style={S.phaseLabel}>Strength — 2× per week, ~25 min</div>
            {STRENGTH.map(s=>{ const isOpen=!!strOpen[s.id];
              return (
                <div key={s.id} style={{ borderRadius:16, border:"1.5px solid var(--line)", background:C.card, marginBottom:8, overflow:"hidden" }}>
                  <button style={S.refBtn} onClick={()=>setStrOpen(o=>({...o,[s.id]:!o[s.id]}))}>
                    <span style={{ fontWeight:800, fontSize:14 }}>{s.title}</span>
                    <span style={{ color:C.muted, transform:isOpen?"rotate(180deg)":"none", display:"inline-block", transition:"transform .2s" }}>▾</span>
                  </button>
                  {isOpen && (
                    <div style={{ padding:"0 16px 16px", borderTop:`1px solid ${C.line}` }}>
                      <div style={S.refNote}>{s.note}</div>
                      {s.exercises.map((ex,i)=><ExerciseCard key={i} ex={ex}/>)}
                    </div>
                  )}
                </div>
              ); })}

            <div style={S.phaseLabel}>Recovery & Red Flags</div>
            {REFNOTES.map(r=>{ const isOpen=!!refOpen[r.id];
              return (
                <div key={r.id} style={S.ref(r.flag)}>
                  <button style={S.refBtn} onClick={()=>setRefOpen(o=>({...o,[r.id]:!o[r.id]}))}>
                    <span style={S.refTitle(r.flag)}>{r.title}</span>
                    <span style={{ color:C.muted, transform:isOpen?"rotate(180deg)":"none", display:"inline-block", transition:"transform .2s" }}>▾</span>
                  </button>
                  {isOpen && (
                    <div style={S.refBody}>
                      <div style={S.refNote}>{r.note}</div>
                      {r.items.map((item,i)=>(
                        <div key={i} style={S.refItem}><span style={{ color:r.flag?"#E0533F":C.teal, flexShrink:0 }}>—</span>{item}</div>
                      ))}
                    </div>
                  )}
                </div>
              ); })}

            <div style={S.mantra}>
              Run mostly easy. Run consistently.<br/>
              Sleep and eat like it's part of training.<br/>
              Let the season's speed come from my coach.
            </div>
          </div>
          
          {toast && (
            <div style={S.toastWrap}>
              <div style={S.toast}>{toast}</div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
